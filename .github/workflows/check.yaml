name: Check PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Lint
        run: ./.github/scripts/lint.sh

  eval:
    runs-on: ubuntu-latest
    needs:
      - lint

    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4.3.0
      - uses: bmuschko/setup-kubeconform@v1
      - name: Eval
        run: |
          .github/scripts/eval.sh
  check-labels:
    runs-on: ubuntu-latest
    needs:
      - lint
      - eval

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "11"
          java-package: jdk

      - id: match-label
        name: Match semver labels
        uses: zwaldowski/match-label-action@v5
        with:
          allowed: major, minor, patch

      - uses: zwaldowski/semver-release-action@v4
        name: Semver release
        with:
          dry_run: true
          bump: ${{ steps.match-label.outputs.match }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  comment:
    runs-on: ubuntu-latest
    needs:
      - check-labels
    if: always() && needs.check-labels.result == 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3.0.0
        with:
          message: "Please apply one of the following labels to the PR: 'patch', 'minor', 'major'."
          github-token: ${{ secrets.GITHUB_TOKEN }}

  prepare-release:
    needs: ["check-labels"]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: bump
        uses: zwaldowski/match-label-action@v5
        with:
          allowed: major,minor,patch

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45

      # prepare yaml parser
      - uses: actions/setup-go@v5
      - name: Install yq
        run: |
          go install github.com/mikefarah/yq/v4@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}

      - name: Collect changed charts
        id: charts
        shell: bash
        run: |
          declare -A changedCharts
          for file in ${{ steps.changed-files.outputs.all_changed_and_modified_files }}; do
            baseFolder=$(cut -d'/' -f1 <<< "$file")
            if [ "$baseFolder" = "charts" ]; then
              chartName=$(cut -d'/' -f2 <<< "$file")
              changedCharts[$chartName]=$chartName
            fi
          done
          CHARTS=""
          for c in "${changedCharts[@]}"; do
            CHARTS="$CHARTS $c"
          done
          echo "list=${CHARTS# }" >> $GITHUB_OUTPUT

      - name: Bump chart versions
        if: steps.charts.outputs.list != ''
        uses: ./.github/actions/bump-chart-version
        with:
          charts: ${{ steps.charts.outputs.list }}
          bump-type: ${{ steps.bump.outputs.match }}

      - name: Commit files
        continue-on-error: true
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: bump chart versions [skip ci]" -a

      - name: Push changes
        continue-on-error: true
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.head_ref }}
