{{- if .Values.enabled }}
{{- if (and .Values.apisix.enabled  (eq .Values.apisix.apisix.deployment.role_data_plane.config_provider "etcd")) }}
{{- $adminUrl := printf "http://%s:%s" (include "odrl-auth.apisix-admin-service" .) (toString (default 9180 .Values.apisix.apisix.admin.servicePort)) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: apisix-routes-job
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "odrl-auth.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      initContainers:
        - name: wait-for-apisix
          image: quay.io/curl/curl:8.1.2
          command:
            - /bin/sh
            - -c
            - |
              until curl -s -o /dev/null -w "%{http_code}" {{ $adminUrl }}/apisix/admin/routes | grep -qE "^(200|401)"; do
                echo "Waiting for APISIX admin API..."
                sleep 5
              done
      containers:
        - name: register-routes
          image: quay.io/curl/curl:8.1.2
          command: [ "/bin/sh", "-c", "/bin/create-routes.sh" ]
          env:
            - name: API_KEY
              {{- if .Values.apisix.apisix.admin.credentials.secretName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apisix.apisix.admin.credentials.secretName }}
                  key: {{ .Values.apisix.apisix.admin.credentials.secretAdminKey | default "admin" }}
              {{- else }}
              value: {{ required "Either apisix.apisix.admin.credentials.admin or apisix.apisix.admin.credentials.secretName must be set" .Values.apisix.apisix.admin.credentials.admin | quote }}
              {{- end }}
          volumeMounts:
            - name: apisix-routes
              mountPath: /bin/create-routes.sh
              subPath: create-routes.sh
      volumes:
        - name: apisix-routes
          configMap:
            name: apisix-routes-script
            defaultMode: 0755

      restartPolicy: Never
  backoffLimit: 10
{{- end }}
{{- end }}